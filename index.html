<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Premium beats and music production by Jonna Rincon" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Jonna Rincon" />

    <!-- PWA Manifests -->
    <link rel="manifest" href="/site.webmanifest" />

    <title>Jonna Rincon - J18</title>

    <!-- FOUC Prevention: Initialize background preload early -->
    <script>
      (function() {
        try {
          const cached = localStorage.getItem('cachedBackground');
          if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed.imageUrl) {
              const link = document.createElement('link');
              link.rel = 'preload';
              link.as = 'image';
              link.href = parsed.imageUrl;
              link.setAttribute('importance', 'high');
              document.head.appendChild(link);
            }
          }
        } catch (e) {
          // Silently fail if localStorage is unavailable
        }
      })();
    </script>
  <style>
    #page-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #page-loader.fade-out { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 40px; height: 40px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  </head>
  <body>
    <div id="page-loader"><div class="loader-ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        var loader = document.getElementById('page-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() { loader.style.display = 'none'; }, 450);
        }
      });
    </script>
  </body>
</html>
